---
- name: Verify and Enforce Base DevOps Tools
  hosts: localhost
  become: true
  tasks:
    - name: Ensure Package Cache is Updated
      apt: { update_cache: yes }
      ignore_errors: yes
    - name: Verify Docker Service is Active
      service: { name: docker, state: started }
    - name: Verify Jenkins Service is Active
      service: { name: jenkins, state: started }

- name: Deploy TaskPipeline Modules to Production K8s
  hosts: production
  become: true
  tasks:
    # 1. Files ko Production server par copy karein
    - name: Copy K8s manifests to remote server
      copy:
        src: ../k8s/
        dest: /home/ubuntu/k8s/
        owner: ubuntu
        mode: '0644'

    # 2. Sudo ke saath apply karein
    - name: Apply Backend Deployment to MicroK8s
      shell: "sudo microk8s kubectl apply -f /home/ubuntu/k8s/backend-deployment.yaml"

    - name: Apply Frontend Deployment to MicroK8s
      shell: "sudo microk8s kubectl apply -f /home/ubuntu/k8s/frontend-deployment.yaml"

    - name: Wait for Pods
      pause: { seconds: 10 }

    - name: Show Pods Status
      shell: "sudo microk8s kubectl get pods -A"
      register: pods_output

    - name: Print Pods
      debug: { var: pods_output.stdout_lines }