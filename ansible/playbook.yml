---
- name: Verify and Enforce Base DevOps Tools
  hosts: localhost
  become: true
  tasks:
    - name: Ensure Package Cache is Updated
      apt: { update_cache: yes }
      ignore_errors: yes
    - name: Verify Docker Service is Active
      service: { name: docker, state: started }
    - name: Verify Jenkins Service is Active
      service: { name: jenkins, state: started }

- name: Setup MicroK8s on Production Server
  hosts: production
  become: yes
  tasks:
    - name: Install MicroK8s
      snap:
        name: microk8s
        classic: yes

    - name: Wait for MicroK8s to be ready
      command: microk8s status --wait-ready

    - name: Add user to microk8s group
      user:
        name: ubuntu
        groups: microk8s
        append: yes

    - name: Create kubectl alias
      command: snap alias microk8s.kubectl kubectl
      ignore_errors: yes

- name: Deploy TaskPipeline Modules to Production K8s
  hosts: production
  become: true
  tasks:
    - name: Ensure k8s directory exists on remote
      file:
        path: /home/ubuntu/k8s/
        state: directory
        owner: ubuntu
        mode: '0755'

    - name: Copy K8s manifests to remote server
      copy:
        src: ../k8s/
        dest: /home/ubuntu/k8s/
        owner: ubuntu
        mode: '0644'

    - name: Delete existing backend service to release port 30081
      shell: "microk8s kubectl delete service taskpipeline-backend-service --ignore-not-found=true"

    - name: Apply Backend Deployment to MicroK8s
      shell: "microk8s kubectl apply -f /home/ubuntu/k8s/backend-deployment.yaml"

    - name: Apply Frontend Deployment to MicroK8s
      shell: "microk8s kubectl apply -f /home/ubuntu/k8s/frontend-deployment.yaml"

    - name: Wait for Pods to stabilize
      pause: { seconds: 15 }

    - name: Show Pods Status
      shell: "microk8s kubectl get pods -A"
      register: pods_output

    - name: Print Pods
      debug: { var: pods_output.stdout_lines }