apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskpipeline-frontend
  labels:
    app: taskpipeline-frontend
spec:
  replicas: 2 # 2 Pods chalenge taake high availability ho
  selector:
    matchLabels:
      app: taskpipeline-frontend
  template:
    metadata:
      labels:
        app: taskpipeline-frontend
    spec:
      containers:
      - name: frontend
        image: mariawahid/taskpipeline-frontend:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: taskpipeline-frontend-service
spec:
  type: NodePort
  selector:
    app: taskpipeline-frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30080 # Browser par access karne ke liye port 30080 use hoga