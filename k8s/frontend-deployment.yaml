apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskpipeline-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: mariawahid/taskpipeline-frontend:latest
        ports:
        - containerPort: 80