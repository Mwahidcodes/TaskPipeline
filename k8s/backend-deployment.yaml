apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskpipeline-backend
  labels:
    app: taskpipeline-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskpipeline-backend
  template:
    metadata:
      labels:
        app: taskpipeline-backend
    spec:
      containers:
      - name: backend
        image: mariawahid/taskpipeline-backend:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: taskpipeline-backend-service
spec:
  type: ClusterIP # Backend internal communication ke liye hota hai
  selector:
    app: taskpipeline-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000