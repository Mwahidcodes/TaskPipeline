# --- Database Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
spec:
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "maria"
        - name: POSTGRES_DB
          value: "taskpipeline"
        ports:
        - containerPort: 5432
---
# --- Database Service ---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# --- Backend Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskpipeline-backend
spec:
  selector:
    matchLabels:
      app: taskpipeline-backend
  template:
    metadata:
      labels:
        app: taskpipeline-backend
    spec:
      containers:
      - name: backend
        image: mariawahid/taskpipeline-backend:latest
        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "maria"
        - name: DB_NAME
          value: "taskpipeline"
        - name: DB_PORT
          value: "5432"
        - name: JWT_SECRET
          value: "mySuperSecretKey123"
        ports:
        - containerPort: 5000
---
# --- Backend Service ---
apiVersion: v1
kind: Service
metadata:
  name: taskpipeline-backend-service
spec:
  type: NodePort
  selector:
    app: taskpipeline-backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30081