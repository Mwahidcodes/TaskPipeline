apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskpipeline-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: mariawahid/taskpipeline-backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"