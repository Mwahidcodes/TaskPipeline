apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskpipeline-backend
  labels:
    app: taskpipeline-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskpipeline-backend
  template:
    metadata:
      labels:
        app: taskpipeline-backend
    spec:
      containers:
      - name: backend
        image: mariawahid/taskpipeline-backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "maria"
        - name: DB_HOST
          value: "16.171.42.170"  # Server IP
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "taskpipeline"
        - name: JWT_SECRET
          value: "my_super_secret_devops_key_123"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: taskpipeline-backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30005