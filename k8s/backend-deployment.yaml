apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskpipeline-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: mariawahid/taskpipeline-backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: DB_HOST
          value: "172.31.47.163"
        - name: DB_USER
          value: "taskuser"
        - name: DB_PASSWORD
          value: "password123"
        - name: DB_NAME
          value: "taskpipeline"
        # Niche wali line add ki hai:
        - name: JWT_SECRET
          value: "mySuperSecretKey123"