# k8s/backend-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: taskpipeline-backend
  ports:
    - port: 5000         # Backend ka internal port
      targetPort: 5000   # Container port
      nodePort: 30081    # React se request yahan jayegi